# ── corp-profile ──────────────────────────────────────────────────────────────
[profile]
llm = false # run LLM enrichment (clean, refine estimates)
web = false # add web search during enrichment (requires llm = true)

[llm]
model = "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
web_search_model = "openai/gpt-5-mini"

[aws]
region = "us-east-2"
# profile = "default"  # uses default profile (MFA session via aws-mfa)
